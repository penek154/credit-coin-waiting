<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ожидание одобрения кредита — интерактивная монетка</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #070b14;
      --bg-2: #101a2e;
      --gold-1: #fbfbf4;
      --gold-2: #e7dfc7;
      --gold-3: #a9a08c;
      --gold-4: #686050;
      --accent: #7ce7ff;
      --tilt-x: -14deg;
      --tilt-y: 28deg;
      --coin-rot-x: 0deg;
      --coin-rot-y: 0deg;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 34%, rgba(124, 231, 255, .14), transparent 27rem),
        radial-gradient(circle at 18% 14%, rgba(255, 212, 95, .10), transparent 18rem),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 52%, #06080e);
      color: #f4f8ff;
      touch-action: manipulation;
      user-select: none;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    .phone {
      width: min(390px, calc(100vw - 28px));
      min-height: min(812px, calc(100vh - 28px));
      border-radius: 46px;
      padding: 18px;
      position: relative;
      background: linear-gradient(155deg, rgba(255,255,255,.16), rgba(255,255,255,.035));
      box-shadow:
        0 34px 90px rgba(0, 0, 0, .55),
        inset 0 0 0 1px rgba(255,255,255,.13);
    }

    .screen {
      position: relative;
      min-height: calc(min(812px, calc(100vh - 28px)) - 36px);
      border-radius: 34px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 34px 26px 28px;
      background:
        radial-gradient(circle at 50% 28%, rgba(124,231,255,.13), transparent 15rem),
        radial-gradient(circle at 50% 54%, rgba(255,212,95,.13), transparent 12rem),
        linear-gradient(180deg, #0d1324, #080b13 70%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .status-bar {
      width: 120px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.75);
      opacity: .55;
      margin-bottom: 42px;
    }

    .copy {
      text-align: center;
      max-width: 300px;
      z-index: 3;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(174, 229, 255, .78);
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 7vw, 34px);
      line-height: 1.04;
      letter-spacing: -.035em;
    }

    .subtitle {
      margin: 14px 0 0;
      font-size: 15px;
      line-height: 1.45;
      color: rgba(230, 238, 255, .72);
    }

    .stage {
      position: relative;
      width: 260px;
      height: 270px;
      display: grid;
      place-items: center;
      margin: 18px 0 0;
      perspective: 900px;
      z-index: 2;
      transform: translateY(-18px);
    }

    .halo {
      position: absolute;
      width: 226px;
      height: 226px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(231, 223, 199, .26), rgba(231, 223, 199, 0) 66%);
      filter: blur(4px);
      animation: breathe 2.8s ease-in-out infinite;
    }

    .orbit {
      position: absolute;
      width: 224px;
      height: 224px;
      border-radius: 50%;
      border: 1px solid rgba(124, 231, 255, .20);
      transform: rotateX(72deg) rotateZ(-14deg);
      animation: orbitGlow 3.8s linear infinite;
    }

    .coin-wrap {
      width: 142px;
      height: 142px;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
      filter: drop-shadow(0 26px 34px rgba(0,0,0,.46));
      transition: transform .34s cubic-bezier(.18, .9, .2, 1.2);
    }

    .coin {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform: rotateX(var(--coin-rot-x)) rotateY(var(--coin-rot-y));
      will-change: transform;
    }

    .face, .back {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      backface-visibility: hidden;
      overflow: hidden;
      background:
        radial-gradient(circle at 31% 24%, var(--gold-1), transparent 25%),
        radial-gradient(circle at 66% 72%, rgba(76,72,64,.28), transparent 38%),
        linear-gradient(135deg, var(--gold-2), var(--gold-3));
      box-shadow:
        inset 0 0 0 5px rgba(255,255,255,.22),
        inset 0 0 0 12px rgba(93,88,77,.22),
        inset 0 0 0 17px rgba(255,255,255,.10),
        inset -16px -22px 28px rgba(39,35,29,.22),
        inset 14px 14px 24px rgba(255,255,255,.34);
    }

    .face::after, .back::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(72, 67, 58, .34);
      pointer-events: none;
    }

    .back { transform: rotateY(180deg); }

    .coin-mark {
      position: relative;
      z-index: 1;
      width: 94px;
      height: 94px;
      display: grid;
      place-items: center;
      color: rgba(53, 49, 42, .78);
      text-shadow: 0 1px rgba(255,255,255,.42);
    }

    .ruble-mark {
      align-content: center;
      gap: 2px;
      font-weight: 850;
      line-height: .9;
      letter-spacing: -.05em;
    }

    .ruble-mark .num {
      font-size: 58px;
    }

    .ruble-mark .label {
      font-size: 13px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .spark {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fbfbf4;
      box-shadow: 0 0 18px #e7dfc7;
      opacity: 0;
      animation: sparkle 2.6s ease-in-out infinite;
    }
    .spark:nth-child(1) { left: 26px; top: 82px; animation-delay: .15s; }
    .spark:nth-child(2) { right: 38px; top: 54px; animation-delay: .9s; transform: scale(.75); }
    .spark:nth-child(3) { right: 56px; bottom: 60px; animation-delay: 1.55s; transform: scale(.55); }

    .hint {
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: rgba(244,248,255,.82);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(14px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px var(--accent);
      animation: pulse .9s ease-in-out infinite alternate;
    }

    .tap-ripple {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 1px solid rgba(124,231,255,.7);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: ripple .62s ease-out forwards;
      z-index: 6;
    }

    @keyframes breathe {
      50% { transform: scale(1.08); opacity: .72; }
    }

    @keyframes orbitGlow {
      50% { border-color: rgba(255, 212, 95, .24); }
      to { rotate: 360deg; }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; translate: 0 8px; }
      35% { opacity: 1; translate: 0 0; }
      70% { opacity: 0; translate: 0 -13px; }
    }

    @keyframes pulse {
      to { transform: scale(1.4); opacity: .55; }
    }

    @keyframes ripple {
      to { width: 160px; height: 160px; opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .halo, .orbit, .spark, .dot { animation-duration: 6s; }
    }

    @media (max-height: 720px) {
      .status-bar { margin-bottom: 26px; }
      .stage { height: 236px; transform: translateY(-12px); }
      .subtitle { margin-top: 10px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <main class="phone" id="phone" aria-label="Интерактивный макет ожидания одобрения кредита">
    <section class="screen">
      <div class="status-bar"></div>

      <div class="copy">
        <p class="eyebrow">Заявка отправлена</p>
        <h1>Ожидаем одобрения кредита</h1>
        <p class="subtitle">Проверяем данные. Обычно это занимает меньше минуты.</p>
      </div>

      <div class="stage" aria-hidden="true">
        <div class="halo"></div>
        <div class="orbit"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>

        <div class="coin-wrap" id="coinWrap">
          <div class="coin" id="coin">
            <div class="face">
              <div class="coin-mark ruble-mark">
                <span class="num">1</span>
                <span class="label">рубль</span>
              </div>
            </div>
            <div class="back">
              <div class="coin-mark ruble-mark">
                <span class="num">₽</span>
                <span class="label">рубль</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="hint"><span class="dot"></span>Тапайте по экрану — сила и ритм задают вращение</div>
    </section>
  </main>

  <script>
    const phone = document.querySelector('#phone');
    const coinWrap = document.querySelector('#coinWrap');
    const coin = document.querySelector('#coin');

    const state = {
      rotX: 0,
      rotY: 0,
      velX: 0,
      velY: 0,
      lastFrame: performance.now(),
      lastTap: null,
      raf: null
    };

    const friction = 0.942;
    const stopThreshold = 0.018;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function render() {
      coin.style.setProperty('--coin-rot-x', `${state.rotX}deg`);
      coin.style.setProperty('--coin-rot-y', `${state.rotY}deg`);
    }

    function tick(now) {
      const dt = clamp((now - state.lastFrame) / 16.67, 0.45, 2.2);
      state.lastFrame = now;

      state.rotX += state.velX * dt;
      state.rotY += state.velY * dt;

      const damping = Math.pow(friction, dt);
      state.velX *= damping;
      state.velY *= damping;

      render();

      if (Math.abs(state.velX) > stopThreshold || Math.abs(state.velY) > stopThreshold) {
        state.raf = requestAnimationFrame(tick);
      } else {
        state.velX = 0;
        state.velY = 0;
        state.raf = null;
      }
    }

    function wakePhysics() {
      if (!state.raf) {
        state.lastFrame = performance.now();
        state.raf = requestAnimationFrame(tick);
      }
    }

    function ripple(x, y) {
      const r = document.createElement('span');
      r.className = 'tap-ripple';
      const rect = phone.getBoundingClientRect();
      r.style.left = `${x - rect.left}px`;
      r.style.top = `${y - rect.top}px`;
      phone.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }

    function kick(event) {
      const rect = phone.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const dx = (event.clientX - centerX) / (rect.width / 2);
      const dy = (event.clientY - centerY) / (rect.height / 2);
      const now = performance.now();

      let cadenceBoost = 1;
      let directionBoostX = 0;
      let directionBoostY = 0;

      if (state.lastTap) {
        const interval = clamp(now - state.lastTap.t, 70, 900);
        const moveX = event.clientX - state.lastTap.x;
        const moveY = event.clientY - state.lastTap.y;
        const distance = Math.hypot(moveX, moveY);

        // Быстрые повторные тапы и резкие перемещения дают более сильный стартовый импульс.
        cadenceBoost = clamp(1 + (520 - interval) / 230 + distance / 190, 0.75, 3.4);
        directionBoostX = clamp(-moveY / interval * 28, -7, 7);
        directionBoostY = clamp(moveX / interval * 28, -7, 7);
      }

      const pressure = event.pressure && event.pressure > 0 ? event.pressure : 0.55;
      const tapSharpness = clamp(cadenceBoost * (0.85 + pressure), 0.7, 4.2);

      state.velY += clamp((7.5 + Math.abs(dx) * 5.5) * tapSharpness + directionBoostY, -24, 24);
      state.velX += clamp((-dy * 8.5) * tapSharpness + directionBoostX, -18, 18);

      const visualTiltX = clamp(-14 - dy * 16, -36, 30);
      const visualTiltY = clamp(28 + dx * 24, -52, 62);
      coinWrap.style.setProperty('--tilt-x', `${visualTiltX}deg`);
      coinWrap.style.setProperty('--tilt-y', `${visualTiltY}deg`);

      state.lastTap = { x: event.clientX, y: event.clientY, t: now };
      ripple(event.clientX, event.clientY);
      wakePhysics();
    }

    render();
    phone.addEventListener('pointerdown', kick);
  </script>
</body>
</html>
